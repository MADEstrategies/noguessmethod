[build]
  command = "npm run build"
  publish = "dist"

[functions]
  "*" = { node_bundler = "esbuild" }
  send-reminders = { schedule = "0,15,30,45 * * * *" }

[[edge_functions]]
  path = "/blog/*"
  function = "blog-meta"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
